name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        shell: pwsh
        run: |
          $iconArgs = @()
          if (Test-Path "eventeditor/assets/icon.ico") {
            $iconArgs = @("--icon", "eventeditor/assets/icon.ico")
          }

          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name EventEditor `
            @iconArgs `
            --collect-all eventeditor `
            --collect-all PyQt5 `
            --hidden-import PyQt5.QtWebEngineWidgets `
            --collect-all evfl `
            --collect-all oead `
            --collect-all byml `
            --collect-all aamp `
            --collect-all zstandard `
            "eventeditor/__main__.py"

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path "dist/EventEditor" -DestinationPath "EventEditor-Windows.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EventEditor-Windows
          path: EventEditor-Windows.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag "EventEditor-Windows.zip" --title $tag --generate-notes
          } else {
            gh release upload $tag "EventEditor-Windows.zip" --clobber
          }
