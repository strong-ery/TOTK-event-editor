name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare build metadata
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $releaseVersion = "${{ github.ref_name }}"
          } else {
            $sha = "${{ github.sha }}"
            $releaseVersion = "dev-" + $sha.Substring(0, 7)
          }
          $safeVersion = $releaseVersion -replace '[^A-Za-z0-9._-]', '-'
          $artifactName = "TOTK-EventEditor_${safeVersion}-Windows"
          $packageName = "$artifactName.zip"

          Set-Content -Path "eventeditor/assets/release_version.txt" -Value $releaseVersion -NoNewline -Encoding UTF8
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        shell: pwsh
        run: |
          $iconArgs = @()
          if (Test-Path "eventeditor/assets/icon.ico") {
            $iconArgs = @("--icon", "eventeditor/assets/icon.ico")
          }

          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name "TOTK EventEditor" `
            @iconArgs `
            --collect-all eventeditor `
            --collect-all PyQt5 `
            --hidden-import PyQt5.QtWebEngineWidgets `
            --collect-all evfl `
            --collect-all oead `
            --collect-all byml `
            --collect-all aamp `
            --collect-all zstandard `
            "scripts/pyinstaller_entry.py"

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path "dist/TOTK EventEditor" -DestinationPath "$env:PACKAGE_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PACKAGE_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag "$env:PACKAGE_NAME" --title $tag --generate-notes
          } else {
            gh release upload $tag "$env:PACKAGE_NAME" --clobber
          }
